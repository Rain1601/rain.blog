<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rain — Signature Design</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1C1917; color: #FAFAF9; font-family: 'Times New Roman', serif; padding: 3rem 2rem; }
  h1 { text-align: center; font-size: 1.75rem; font-weight: 400; margin-bottom: 0.25rem; }
  .subtitle { text-align: center; color: #57534E; font-size: 0.8125rem; margin-bottom: 3rem; }
  .row { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; margin-bottom: 2.5rem; }
  .card { text-align: center; }
  .card-label { font-size: 0.625rem; color: #57534E; margin-top: 0.5rem; letter-spacing: 0.05em; }
  .box { width: 280px; height: 120px; display: flex; align-items: center; justify-content: center; border-radius: 12px; border: 1px solid #292524; }
  .box.dark { background: #1C1917; }
  .box.cream { background: #FAF8F4; border-color: #e0d8cc; }
  .box.stone { background: #292524; border-color: #44403C; }
  .divider { height: 1px; background: #292524; margin: 2rem 0; }
  .section-title { font-size: 1rem; color: #78716C; text-align: center; margin-bottom: 1.5rem; }
</style>
</head>
<body>

<h1>Rain — Signature</h1>
<p class="subtitle">手写签名 · 个人品牌标识 · 多种风格</p>

<!-- ===== Style 1: Cursive flow ===== -->
<div class="section-title">A · 流畅草书</div>
<div class="row">
  <div class="card">
    <div class="box dark">
      <svg viewBox="0 0 300 80" width="240" height="64" fill="none">
        <!-- R -->
        <path d="M20 65 L22 15 C22 12, 24 10, 28 10 C38 10, 50 12, 52 22 C54 32, 46 38, 36 38 L54 65"
              stroke="#d97757" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round"/>
        <!-- a -->
        <path d="M68 35 C78 28, 95 28, 95 42 C95 56, 78 62, 68 55 C58 48, 62 35, 68 35Z M95 35 L95 62"
              stroke="#d97757" strokeWidth="4.5" strokeLinecap="round"/>
        <!-- i -->
        <path d="M112 38 L112 62" stroke="#d97757" strokeWidth="4.5" strokeLinecap="round"/>
        <circle cx="112" cy="28" r="3.5" fill="#d97757"/>
        <!-- n -->
        <path d="M126 62 L126 38 C126 32, 135 28, 145 32 C150 34, 152 40, 152 46 L152 62"
              stroke="#d97757" strokeWidth="4.5" strokeLinecap="round"/>
        <!-- Decorative underline swoosh -->
        <path d="M18 70 C50 72, 100 68, 155 72 C180 74, 200 68, 220 72"
              stroke="#d97757" strokeWidth="3" strokeLinecap="round" opacity="0.4"/>
        <!-- Dot accent -->
        <circle cx="225" cy="70" r="3" fill="#d97757" opacity="0.5"/>
      </svg>
    </div>
    <div class="card-label">陶土 · 深色</div>
  </div>
  <div class="card">
    <div class="box cream">
      <svg viewBox="0 0 300 80" width="240" height="64" fill="none">
        <path d="M20 65 L22 15 C22 12, 24 10, 28 10 C38 10, 50 12, 52 22 C54 32, 46 38, 36 38 L54 65" stroke="#d97757" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round"/>
        <path d="M68 35 C78 28, 95 28, 95 42 C95 56, 78 62, 68 55 C58 48, 62 35, 68 35Z M95 35 L95 62" stroke="#d97757" strokeWidth="4.5" strokeLinecap="round"/>
        <path d="M112 38 L112 62" stroke="#d97757" strokeWidth="4.5" strokeLinecap="round"/>
        <circle cx="112" cy="28" r="3.5" fill="#d97757"/>
        <path d="M126 62 L126 38 C126 32, 135 28, 145 32 C150 34, 152 40, 152 46 L152 62" stroke="#d97757" strokeWidth="4.5" strokeLinecap="round"/>
        <path d="M18 70 C50 72, 100 68, 155 72 C180 74, 200 68, 220 72" stroke="#d97757" strokeWidth="3" strokeLinecap="round" opacity="0.4"/>
        <circle cx="225" cy="70" r="3" fill="#d97757" opacity="0.5"/>
      </svg>
    </div>
    <div class="card-label">陶土 · 暖白</div>
  </div>
</div>

<!-- ===== Style 2: Bold marker ===== -->
<div class="section-title">B · 粗体马克笔</div>
<div class="row">
  <div class="card">
    <div class="box dark">
      <svg viewBox="0 0 300 80" width="240" height="64" fill="none">
        <!-- R — bold -->
        <path d="M18 68 L20 10 C20 8, 50 6, 54 18 C58 30, 42 36, 30 36 L58 68"
              stroke="rgba(255,255,255,0.9)" strokeWidth="8" strokeLinecap="round" strokeLinejoin="round"/>
        <!-- a -->
        <path d="M78 34 C90 26, 108 28, 108 44 C108 60, 88 64, 78 56 C68 48, 72 34, 78 34Z M108 32 L108 64"
              stroke="rgba(255,255,255,0.9)" strokeWidth="7" strokeLinecap="round"/>
        <!-- i -->
        <path d="M128 38 L128 64" stroke="rgba(255,255,255,0.9)" strokeWidth="7" strokeLinecap="round"/>
        <circle cx="128" cy="26" r="5" fill="rgba(255,255,255,0.9)"/>
        <!-- n -->
        <path d="M146 64 L146 38 C146 30, 158 26, 170 32 C176 36, 178 42, 178 50 L178 64"
              stroke="rgba(255,255,255,0.9)" strokeWidth="7" strokeLinecap="round"/>
        <!-- Terracotta dot -->
        <circle cx="198" cy="58" r="6" fill="#d97757"/>
      </svg>
    </div>
    <div class="card-label">白色粗笔 + 陶土点</div>
  </div>
  <div class="card">
    <div class="box stone">
      <svg viewBox="0 0 300 80" width="240" height="64" fill="none">
        <path d="M18 68 L20 10 C20 8, 50 6, 54 18 C58 30, 42 36, 30 36 L58 68" stroke="#d97757" strokeWidth="8" strokeLinecap="round" strokeLinejoin="round"/>
        <path d="M78 34 C90 26, 108 28, 108 44 C108 60, 88 64, 78 56 C68 48, 72 34, 78 34Z M108 32 L108 64" stroke="#d97757" strokeWidth="7" strokeLinecap="round"/>
        <path d="M128 38 L128 64" stroke="#d97757" strokeWidth="7" strokeLinecap="round"/>
        <circle cx="128" cy="26" r="5" fill="#d97757"/>
        <path d="M146 64 L146 38 C146 30, 158 26, 170 32 C176 36, 178 42, 178 50 L178 64" stroke="#d97757" strokeWidth="7" strokeLinecap="round"/>
        <circle cx="198" cy="58" r="6" fill="#d97757"/>
      </svg>
    </div>
    <div class="card-label">陶土粗笔 · 石板</div>
  </div>
</div>

<!-- ===== Style 3: One-line signature ===== -->
<div class="section-title">C · 一笔连签</div>
<div class="row">
  <div class="card">
    <div class="box dark">
      <svg viewBox="0 0 320 80" width="260" height="64" fill="none">
        <!-- One continuous stroke: R-a-i-n -->
        <path d="M15 65 L18 12 C18 8, 48 6, 52 18 C56 30, 38 36, 26 36 L52 58
               C56 62, 62 56, 68 38 C74 28, 86 26, 96 34 C106 42, 100 58, 92 60 C84 62, 80 56, 82 48
               L96 34 L96 60
               C100 64, 108 56, 112 40
               L112 60
               C116 64, 122 56, 128 38 C134 28, 146 26, 155 34 C160 38, 162 48, 162 60
               C166 64, 180 62, 200 58 C220 54, 240 56, 260 60"
              stroke="#d97757" strokeWidth="4" strokeLinecap="round" fill="none"/>
        <!-- i dot -->
        <circle cx="112" cy="28" r="3" fill="#d97757"/>
        <!-- End dot -->
        <circle cx="265" cy="58" r="3.5" fill="#d97757" opacity="0.5"/>
      </svg>
    </div>
    <div class="card-label">一笔成型 · 陶土</div>
  </div>
  <div class="card">
    <div class="box cream">
      <svg viewBox="0 0 320 80" width="260" height="64" fill="none">
        <path d="M15 65 L18 12 C18 8, 48 6, 52 18 C56 30, 38 36, 26 36 L52 58
               C56 62, 62 56, 68 38 C74 28, 86 26, 96 34 C106 42, 100 58, 92 60 C84 62, 80 56, 82 48
               L96 34 L96 60
               C100 64, 108 56, 112 40
               L112 60
               C116 64, 122 56, 128 38 C134 28, 146 26, 155 34 C160 38, 162 48, 162 60
               C166 64, 180 62, 200 58 C220 54, 240 56, 260 60"
              stroke="#1C1917" strokeWidth="4" strokeLinecap="round" fill="none"/>
        <circle cx="112" cy="28" r="3" fill="#1C1917"/>
        <circle cx="265" cy="58" r="3.5" fill="#d97757"/>
      </svg>
    </div>
    <div class="card-label">一笔成型 · 墨黑</div>
  </div>
</div>

<!-- ===== Style 4: Squiggle signature (replaces the hand squiggle) ===== -->
<div class="section-title">D · 涂鸦签名（替代手绘涂鸦）</div>
<div class="row">
  <div class="card">
    <div class="box dark">
      <svg viewBox="0 0 340 90" width="280" height="72" fill="none">
        <!-- Squiggle-style Rain — like the hand motif but forming letters -->
        <!-- R squiggle -->
        <path d="M20 72 C22 50, 24 30, 22 14 C22 10, 40 8, 48 16 C56 24, 50 36, 34 38 C28 38, 34 45, 42 55 C48 62, 52 68, 56 70"
              stroke="rgba(255,255,255,0.9)" strokeWidth="6" strokeLinecap="round"/>
        <!-- a squiggle -->
        <path d="M62 42 C68 32, 88 30, 92 42 C96 54, 78 62, 68 56 C60 50, 64 38, 70 36 M92 36 C92 42, 92 55, 94 65"
              stroke="rgba(255,255,255,0.85)" strokeWidth="5.5" strokeLinecap="round"/>
        <!-- i -->
        <path d="M110 40 C110 48, 110 58, 112 68" stroke="rgba(255,255,255,0.8)" strokeWidth="5" strokeLinecap="round"/>
        <circle cx="112" cy="28" r="4" fill="#d97757"/>
        <!-- n squiggle -->
        <path d="M126 68 C126 55, 126 42, 128 36 C130 30, 142 28, 152 34 C158 38, 160 48, 160 58 C160 64, 162 68, 164 70"
              stroke="rgba(255,255,255,0.75)" strokeWidth="4.5" strokeLinecap="round"/>
        <!-- Trailing swoosh -->
        <path d="M164 70 C180 66, 200 72, 220 68 C240 64, 260 70, 280 66"
              stroke="rgba(255,255,255,0.5)" strokeWidth="3.5" strokeLinecap="round"/>
        <!-- End dot -->
        <circle cx="285" cy="65" r="4" fill="#d97757"/>
      </svg>
    </div>
    <div class="card-label">涂鸦签名 · 白色</div>
  </div>
  <div class="card">
    <div class="box dark">
      <svg viewBox="0 0 340 90" width="280" height="72" fill="none">
        <path d="M20 72 C22 50, 24 30, 22 14 C22 10, 40 8, 48 16 C56 24, 50 36, 34 38 C28 38, 34 45, 42 55 C48 62, 52 68, 56 70"
              stroke="#d97757" strokeWidth="6" strokeLinecap="round"/>
        <path d="M62 42 C68 32, 88 30, 92 42 C96 54, 78 62, 68 56 C60 50, 64 38, 70 36 M92 36 C92 42, 92 55, 94 65"
              stroke="#d97757" strokeWidth="5.5" strokeLinecap="round"/>
        <path d="M110 40 C110 48, 110 58, 112 68" stroke="#d97757" strokeWidth="5" strokeLinecap="round"/>
        <circle cx="112" cy="28" r="4" fill="#d97757"/>
        <path d="M126 68 C126 55, 126 42, 128 36 C130 30, 142 28, 152 34 C158 38, 160 48, 160 58 C160 64, 162 68, 164 70"
              stroke="#d97757" strokeWidth="4.5" strokeLinecap="round"/>
        <path d="M164 70 C180 66, 200 72, 220 68 C240 64, 260 70, 280 66"
              stroke="#d97757" strokeWidth="3.5" strokeLinecap="round" opacity="0.4"/>
        <circle cx="285" cy="65" r="4" fill="#d97757" opacity="0.5"/>
      </svg>
    </div>
    <div class="card-label">涂鸦签名 · 陶土</div>
  </div>
</div>

<!-- ===== Style 5: Minimal + "出品" ===== -->
<div class="section-title">E · 极简 + 出品</div>
<div class="row">
  <div class="card">
    <div class="box dark" style="width: 300px;">
      <svg viewBox="0 0 360 80" width="280" height="62" fill="none">
        <!-- Rain in simple strokes -->
        <path d="M20 65 L22 15 C22 12, 24 10, 28 10 C38 10, 50 12, 52 22 C54 32, 46 38, 36 38 L54 65" stroke="#d97757" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round"/>
        <path d="M68 35 C78 28, 95 28, 95 42 C95 56, 78 62, 68 55 C58 48, 62 35, 68 35Z M95 35 L95 62" stroke="#d97757" strokeWidth="4.5" strokeLinecap="round"/>
        <path d="M112 38 L112 62" stroke="#d97757" strokeWidth="4.5" strokeLinecap="round"/>
        <circle cx="112" cy="28" r="3.5" fill="#d97757"/>
        <path d="M126 62 L126 38 C126 32, 135 28, 145 32 C150 34, 152 40, 152 46 L152 62" stroke="#d97757" strokeWidth="4.5" strokeLinecap="round"/>
        <!-- Divider -->
        <path d="M170 25 L170 62" stroke="#d97757" strokeWidth="1.5" opacity="0.25"/>
        <!-- 出品 -->
        <text x="185" y="50" fill="#d97757" fontSize="18" fontFamily="'SimSun','宋体',serif" opacity="0.5">出品</text>
      </svg>
    </div>
    <div class="card-label">Rain 出品 · 陶土</div>
  </div>
  <div class="card">
    <div class="box cream" style="width: 300px;">
      <svg viewBox="0 0 360 80" width="280" height="62" fill="none">
        <path d="M20 65 L22 15 C22 12, 24 10, 28 10 C38 10, 50 12, 52 22 C54 32, 46 38, 36 38 L54 65" stroke="#1C1917" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round"/>
        <path d="M68 35 C78 28, 95 28, 95 42 C95 56, 78 62, 68 55 C58 48, 62 35, 68 35Z M95 35 L95 62" stroke="#1C1917" strokeWidth="4.5" strokeLinecap="round"/>
        <path d="M112 38 L112 62" stroke="#1C1917" strokeWidth="4.5" strokeLinecap="round"/>
        <circle cx="112" cy="28" r="3.5" fill="#1C1917"/>
        <path d="M126 62 L126 38 C126 32, 135 28, 145 32 C150 34, 152 40, 152 46 L152 62" stroke="#1C1917" strokeWidth="4.5" strokeLinecap="round"/>
        <path d="M170 25 L170 62" stroke="#1C1917" strokeWidth="1.5" opacity="0.15"/>
        <text x="185" y="50" fill="#1C1917" fontSize="18" fontFamily="'SimSun','宋体',serif" opacity="0.35">出品</text>
      </svg>
    </div>
    <div class="card-label">Rain 出品 · 墨黑暖白</div>
  </div>
</div>

<div class="divider"></div>

<!-- ===== Usage preview: Logo + Signature ===== -->
<div class="section-title">组合预览 — Logo + 签名</div>
<div class="row">
  <div class="card">
    <div class="box dark" style="width: 200px; height: 160px; flex-direction: column; display: flex; align-items: center; justify-content: center; gap: 12px;">
      <!-- Uteki logo -->
      <svg viewBox="0 0 200 200" width="48" height="48" fill="none">
        <path d="M54 30 C52 28, 56 26, 58 28 L60 42 C58 44, 54 44, 52 42Z" fill="#d97757"/>
        <path d="M42 46 C44 42, 64 41, 66 46 L68 100 C66 106, 44 107, 42 100Z" fill="#d97757"/>
        <path d="M54 100 L52 126 C50 130, 58 132, 60 128 L62 102Z" fill="#d97757"/>
        <path d="M92 18 C90 16, 96 14, 98 16 L100 36 C98 38, 94 38, 92 36Z" fill="#d97757"/>
        <path d="M84 36 C86 32, 108 31, 110 36 L112 120 C110 126, 88 127, 84 120Z" fill="#d97757"/>
        <path d="M96 120 L94 150 C92 154, 100 156, 102 152 L104 122Z" fill="#d97757"/>
        <path d="M140 52 C142 48, 148 50, 146 54 L144 68Z" fill="#d97757"/>
        <path d="M132 68 C134 64, 152 63, 156 68 L158 112 C156 118, 136 119, 132 112Z" fill="#d97757"/>
        <path d="M142 112 L140 140 C138 144, 146 146, 148 142 L150 114Z" fill="#d97757"/>
      </svg>
      <span style="font-size:14px; color:#A8A29E; font-weight:600;">Uteki</span>
      <!-- Signature -->
      <svg viewBox="0 0 300 50" width="100" height="16" fill="none">
        <path d="M20 42 L22 12 C22 10, 40 8, 44 16 C48 24, 38 28, 30 28 L46 42" stroke="#d97757" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"/>
        <path d="M56 26 C62 22, 74 22, 74 32 C74 42, 62 44, 56 40 C50 36, 54 26, 56 26Z M74 24 L74 44" stroke="#d97757" strokeWidth="3.5" strokeLinecap="round"/>
        <path d="M86 28 L86 44" stroke="#d97757" strokeWidth="3.5" strokeLinecap="round"/>
        <circle cx="86" cy="20" r="2.5" fill="#d97757"/>
        <path d="M96 44 L96 28 C96 24, 104 22, 112 26 C116 28, 118 34, 118 40 L118 44" stroke="#d97757" strokeWidth="3.5" strokeLinecap="round"/>
        <path d="M130 18 L130 44" stroke="#d97757" strokeWidth="1" opacity="0.2"/>
        <text x="140" y="38" fill="#d97757" fontSize="14" fontFamily="'SimSun',serif" opacity="0.4">出品</text>
      </svg>
    </div>
    <div class="card-label">Logo + 签名 组合</div>
  </div>
</div>

</body>
</html>
