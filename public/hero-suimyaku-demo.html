<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Suimyaku Hero Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: #03050b;
      color: white;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .hero {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 22% 20%, rgba(255,255,255,.54), transparent 22%),
        radial-gradient(circle at 78% 22%, rgba(112,82,255,.58), transparent 26%),
        radial-gradient(circle at 50% 74%, rgba(0,18,74,.88), transparent 45%),
        linear-gradient(135deg, #031020, #0c2f73 42%, #37208c 72%, #8a65ff);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: -10%;
      z-index: 0;
      background:
        radial-gradient(ellipse at 20% 14%, rgba(255,255,255,.72), transparent 26%),
        radial-gradient(ellipse at 78% 22%, rgba(187,156,255,.62), transparent 31%),
        radial-gradient(ellipse at 88% 80%, rgba(255,255,255,.32), transparent 28%),
        radial-gradient(ellipse at 35% 82%, rgba(0,20,88,.86), transparent 48%);
      filter: blur(24px);
      animation: pulse 11s ease-in-out infinite;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0) 42%, rgba(0,0,0,.88) 100%),
        radial-gradient(ellipse at center, transparent 0 35%, rgba(0,0,0,.44) 100%);
    }

    .content {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 80px 24px 140px;
      text-align: center;
    }

    .mark {
      width: 82px;
      height: 82px;
      margin: 0 auto 32px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.3);
      background: radial-gradient(circle at 40% 25%, rgba(255,255,255,.72), rgba(90,116,255,.28) 38%, rgba(7,10,40,.42));
      box-shadow: inset 0 0 24px rgba(255,255,255,.18), 0 22px 80px rgba(50,70,255,.3);
    }

    h1 {
      margin: 0;
      color: rgba(2,4,12,.9);
      font-size: clamp(58px, 8.5vw, 126px);
      line-height: .94;
      letter-spacing: -0.05em;
      font-weight: 720;
    }

    .dark h1 {
      color: rgba(255,255,255,.94);
      font-family: Georgia, "Times New Roman", SimSun, serif;
      font-weight: 400;
    }

    p {
      margin: 26px auto 0;
      max-width: 680px;
      color: rgba(255,255,255,.68);
      font-size: clamp(17px, 1.6vw, 22px);
      line-height: 1.75;
    }

    .metrics {
      position: absolute;
      left: 50%;
      bottom: 34px;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 14px;
      width: min(820px, calc(100vw - 42px));
      transform: translateX(-50%);
    }

    .metric {
      padding: 18px 20px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      background: rgba(4,8,20,.32);
      backdrop-filter: blur(22px);
    }

    .metric span {
      display: block;
      color: rgba(255,255,255,.42);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      color: rgba(255,255,255,.86);
      font-size: 18px;
      font-weight: 600;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1) translate3d(0,0,0); filter: blur(24px) saturate(1.05); }
      50% { transform: scale(1.055) translate3d(1%, -1%, 0); filter: blur(30px) saturate(1.24); }
    }
  </style>
</head>
<body>
  <main class="hero">
    <canvas id="veins"></canvas>
    <section class="content dark">
      <div>
        <div class="mark"></div>
        <h1>Suimyaku</h1>
        <p>水脉不是静态背景，而是一张缓慢流动的世界秩序图。线条代表资金、商品、利率、政策与产业链之间的隐性连接。</p>
      </div>
    </section>
    <section class="metrics">
      <div class="metric"><span>Observable</span><strong>Trace / Flow / Cost</strong></div>
      <div class="metric"><span>Evaluable</span><strong>Signal / Evidence</strong></div>
      <div class="metric"><span>Continuous</span><strong>Schedule / Replay</strong></div>
    </section>
  </main>
  <script>
    const canvas = document.getElementById('veins');
    const ctx = canvas.getContext('2d');
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    let w = 0;
    let h = 0;
    let t = 0;

    function resize() {
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = Math.floor(w * DPR);
      canvas.height = Math.floor(h * DPR);
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }

    function drawVein(seed, yBase, amp, alpha) {
      ctx.beginPath();
      for (let x = -80; x <= w + 80; x += 18) {
        const p = x / w;
        const y =
          yBase +
          Math.sin(p * 7 + t * 0.65 + seed) * amp +
          Math.sin(p * 19 + t * 0.28 + seed * 2) * amp * 0.32;
        if (x === -80) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);

        if (x % 144 === 0) {
          const branch = 44 + Math.sin(t + seed + x) * 18;
          ctx.moveTo(x, y);
          ctx.quadraticCurveTo(x + 38, y - branch, x + 92, y - branch * 0.45);
          ctx.moveTo(x, y);
        }
      }
      ctx.strokeStyle = `rgba(220, 235, 255, ${alpha})`;
      ctx.lineWidth = 1;
      ctx.shadowColor = `rgba(105, 155, 255, ${alpha * 1.8})`;
      ctx.shadowBlur = 16;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    function frame() {
      t += 0.008;
      ctx.clearRect(0, 0, w, h);
      ctx.globalCompositeOperation = 'screen';
      drawVein(0.2, h * 0.22, 42, 0.18);
      drawVein(1.7, h * 0.38, 56, 0.14);
      drawVein(3.1, h * 0.56, 68, 0.12);
      drawVein(4.6, h * 0.74, 52, 0.1);

      for (let i = 0; i < 40; i += 1) {
        const x = (Math.sin(i * 91.7 + t * 0.7) * 0.5 + 0.5) * w;
        const y = (Math.cos(i * 47.3 + t * 0.45) * 0.5 + 0.5) * h;
        const r = 1.4 + (i % 5) * 0.55;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(235,245,255,.18)';
        ctx.fill();
      }
      ctx.globalCompositeOperation = 'source-over';
      requestAnimationFrame(frame);
    }

    window.addEventListener('resize', resize);
    resize();
    frame();
  </script>
</body>
</html>
