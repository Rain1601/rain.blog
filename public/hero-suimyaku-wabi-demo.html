<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Suimyaku Wabi Hero</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: #11100d;
      color: #ede7d9;
      font-family: "Times New Roman", "Songti SC", SimSun, serif;
    }

    .hero {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(17,16,13,.48), rgba(17,16,13,.96)),
        radial-gradient(ellipse at 18% 18%, rgba(222,210,179,.12), transparent 25%),
        radial-gradient(ellipse at 82% 74%, rgba(66,94,98,.13), transparent 33%),
        #11100d;
      isolation: isolate;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: .7;
    }

    .mist {
      position: absolute;
      inset: -10%;
      background:
        radial-gradient(ellipse at 74% 22%, rgba(231,220,193,.16), transparent 24%),
        radial-gradient(ellipse at 22% 78%, rgba(52,80,84,.16), transparent 34%);
      filter: blur(22px);
      animation: breathe 18s ease-in-out infinite;
    }

    .content {
      position: relative;
      z-index: 2;
      width: min(1120px, calc(100vw - 56px));
      min-height: 100vh;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .copy {
      width: min(520px, 100%);
      margin-top: 10vh;
    }

    .eyebrow {
      display: block;
      margin-bottom: 28px;
      color: rgba(181,159,118,.82);
      font: 600 12px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(62px, 8.4vw, 132px);
      font-weight: 400;
      line-height: .92;
      letter-spacing: 0;
    }

    p {
      margin: 34px 0 0;
      max-width: 450px;
      color: rgba(237,231,217,.56);
      font-size: 18px;
      line-height: 1.95;
    }

    .axis {
      position: absolute;
      left: 9vw;
      bottom: 14vh;
      z-index: 2;
      color: rgba(237,231,217,.44);
      font: 12px/2 ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .12em;
    }

    .axis::before {
      content: "";
      display: block;
      width: 180px;
      height: 1px;
      margin-bottom: 18px;
      background: linear-gradient(to right, rgba(237,231,217,.22), transparent);
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: .68; }
      50% { transform: scale(1.035); opacity: .86; }
    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="mist"></div>
    <canvas id="veins"></canvas>
    <section class="content">
      <div class="copy">
        <span class="eyebrow">SUIMYAKU / MACRO ORDER</span>
        <h1>水脉</h1>
        <p>世界变化不是噪音，而是水脉改道。宏观、资金、政策与产业在暗处连接，缓慢但不可忽视。</p>
      </div>
    </section>
    <div class="axis">ORDER<br />CAPITAL<br />FLOW</div>
  </main>
  <script>
    const canvas = document.getElementById('veins');
    const ctx = canvas.getContext('2d');
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    let w = 0;
    let h = 0;
    let t = 0;

    function resize() {
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = Math.floor(w * DPR);
      canvas.height = Math.floor(h * DPR);
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }

    function vein(offset, base, alpha) {
      ctx.beginPath();
      for (let x = -80; x <= w + 80; x += 22) {
        const p = x / w;
        const y = base + Math.sin(p * 4.2 + offset + t) * 34 + Math.sin(p * 13 + offset) * 10;
        if (x === -80) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);

        if (x % 176 === 0) {
          ctx.moveTo(x, y);
          ctx.quadraticCurveTo(x + 52, y - 32, x + 118, y - 18);
        }
      }
      ctx.strokeStyle = `rgba(220, 211, 188, ${alpha})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function draw() {
      t += 0.004;
      ctx.clearRect(0, 0, w, h);
      ctx.globalCompositeOperation = 'screen';
      vein(0, h * .28, .16);
      vein(1.7, h * .48, .13);
      vein(3.4, h * .68, .11);
      ctx.globalCompositeOperation = 'source-over';
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
  </script>
</body>
</html>
