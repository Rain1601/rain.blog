<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rain Hero Demo</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #07080d;
      --white: rgba(255, 255, 255, 0.94);
      --muted: rgba(255, 255, 255, 0.58);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: #05060c;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .hero {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 28% 18%, rgba(255,255,255,.9), transparent 18%),
        radial-gradient(circle at 72% 22%, rgba(136,99,255,.7), transparent 24%),
        radial-gradient(circle at 25% 70%, rgba(0,94,255,.75), transparent 34%),
        linear-gradient(135deg, #051836 0%, #1d34d8 45%, #8055ff 78%, #ece5ff 100%);
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      inset: -12%;
      z-index: -2;
      background:
        radial-gradient(ellipse at 12% 20%, rgba(255,255,255,.74) 0 11%, transparent 25%),
        radial-gradient(ellipse at 35% 34%, rgba(176,206,255,.42) 0 15%, transparent 34%),
        radial-gradient(ellipse at 82% 30%, rgba(190,137,255,.48) 0 18%, transparent 36%),
        radial-gradient(ellipse at 88% 78%, rgba(255,255,255,.68) 0 11%, transparent 27%),
        radial-gradient(ellipse at 45% 88%, rgba(0,21,80,.8) 0 24%, transparent 42%);
      filter: blur(18px) saturate(1.18);
      transform-origin: 50% 45%;
      animation: breathe 10s ease-in-out infinite;
    }

    .hero::after {
      z-index: -1;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(255,255,255,.04), transparent 34%, rgba(0,0,0,.88) 100%),
        radial-gradient(circle at 50% 42%, transparent 0 22%, rgba(0,0,0,.2) 72%, rgba(0,0,0,.72) 100%);
      filter: none;
      animation: none;
    }

    .drop {
      position: absolute;
      border-radius: 999px;
      background:
        radial-gradient(circle at 35% 25%, rgba(255,255,255,.9), rgba(255,255,255,.16) 18%, transparent 52%),
        linear-gradient(145deg, rgba(255,255,255,.24), rgba(74,126,255,.08));
      border: 1px solid rgba(255,255,255,.22);
      box-shadow: inset 0 1px 10px rgba(255,255,255,.2), 0 18px 60px rgba(39,86,255,.22);
      filter: blur(.2px);
      animation: drift var(--dur) ease-in-out infinite;
      opacity: .78;
    }

    .drop:nth-child(1) { width: 210px; height: 270px; left: 8%; top: 6%; --dur: 12s; }
    .drop:nth-child(2) { width: 120px; height: 160px; left: 76%; top: 12%; --dur: 14s; animation-delay: -4s; }
    .drop:nth-child(3) { width: 90px; height: 120px; left: 68%; top: 62%; --dur: 11s; animation-delay: -2s; }
    .drop:nth-child(4) { width: 150px; height: 210px; left: 18%; top: 58%; --dur: 16s; animation-delay: -7s; }

    .grain {
      position: absolute;
      inset: 0;
      opacity: .18;
      mix-blend-mode: overlay;
      background-image:
        repeating-radial-gradient(circle at 20% 20%, rgba(255,255,255,.2) 0 1px, transparent 1px 4px);
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.8), rgba(0,0,0,.1));
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 2;
      width: min(880px, calc(100vw - 48px));
      padding-top: 12vh;
      text-align: center;
    }

    .badge {
      width: 86px;
      height: 86px;
      margin: 0 auto 36px;
      border-radius: 24px;
      background: rgba(255,255,255,.92);
      display: grid;
      place-items: center;
      box-shadow: 0 24px 80px rgba(9, 24, 120, .24);
    }

    .badge span {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background: radial-gradient(circle at 35% 20%, #b7b2ff, #4557ff 72%);
      box-shadow: inset 0 0 20px rgba(255,255,255,.45);
      display: grid;
      place-items: center;
      color: white;
      font-size: 26px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      color: #050507;
      font-size: clamp(56px, 8vw, 112px);
      line-height: .94;
      letter-spacing: -0.04em;
      font-weight: 680;
    }

    p {
      margin: 28px auto 0;
      max-width: 560px;
      color: rgba(4, 7, 18, .72);
      font-size: clamp(18px, 2vw, 24px);
      line-height: 1.55;
      font-weight: 560;
    }

    .cta {
      margin-top: 28px;
      border: 0;
      border-radius: 999px;
      padding: 13px 22px;
      color: white;
      background: #050505;
      font-size: 15px;
      font-weight: 700;
    }

    .cards {
      position: absolute;
      left: 50%;
      bottom: -44px;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(2, minmax(260px, 1fr));
      gap: 16px;
      width: min(720px, calc(100vw - 40px));
      transform: translateX(-50%);
    }

    .card {
      min-height: 136px;
      padding: 24px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(10,10,18,.42);
      backdrop-filter: blur(24px);
      color: rgba(255,255,255,.86);
      box-shadow: 0 28px 100px rgba(0,0,0,.34);
    }

    .card strong { display: block; margin-bottom: 8px; font-size: 17px; }
    .card span { color: rgba(255,255,255,.56); line-height: 1.55; font-size: 14px; }

    @keyframes breathe {
      0%, 100% { transform: scale(1) translate3d(0, 0, 0); filter: blur(18px) saturate(1.18); }
      50% { transform: scale(1.045) translate3d(-1.5%, 1%, 0); filter: blur(22px) saturate(1.34); }
    }

    @keyframes drift {
      0%, 100% { transform: translate3d(0, 0, 0) rotate(-4deg) scale(1); }
      50% { transform: translate3d(22px, -18px, 0) rotate(5deg) scale(1.04); }
    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="drop"></div>
    <div class="drop"></div>
    <div class="drop"></div>
    <div class="drop"></div>
    <div class="grain"></div>
    <section class="content">
      <div class="badge"><span>›_</span></div>
      <h1>Rain</h1>
      <p>一个有呼吸感的雨滴背景，适合作为个人主页或 Uteki 首屏的轻盈版本。</p>
      <button class="cta">查看作品</button>
    </section>
    <section class="cards">
      <div class="card"><strong>可观测 Agent</strong><span>Trace、工具调用、成本与延迟在运行中可见。</span></div>
      <div class="card"><strong>投资研究场景</strong><span>从问题拆解到证据收集，再到报告生成。</span></div>
    </section>
  </main>
</body>
</html>
